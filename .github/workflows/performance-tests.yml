name: DemoBlaze Performance Tests - QAM010

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - endurance
          - all

env:
  JMETER_VERSION: '5.6.3'
  JMETER_HOME: /opt/apache-jmeter

jobs:
  baseline-test:
    name: Baseline Test (50 Users)
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'baseline' ||
      github.event.inputs.test_type == 'all'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}

      - name: Create Directories
        run: mkdir -p results reports/baseline

      - name: Run Baseline Test
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t DemoBlaze_PerformanceTest.jmx \
            -l results/demoblaze_baseline.jtl \
            -e \
            -o reports/baseline \
            -JUSERNAME=${{ secrets.DEMOBLAZE_USERNAME }} \
            -JPASSWORD=${{ secrets.DEMOBLAZE_PASSWORD }}
        continue-on-error: true

      - name: Check Error Rate
        run: |
          python3 << 'EOF'
          import csv, sys
          total = errors = 0
          try:
              with open("results/demoblaze_baseline.jtl") as f:
                  for row in csv.DictReader(f):
                      total += 1
                      if row.get("success","").lower() == "false":
                          errors += 1
          except FileNotFoundError:
              print("No results file found")
              sys.exit(0)
          if total == 0:
              print("No results collected")
              sys.exit(0)
          rate = (errors/total)*100
          print(f"Total: {total} | Errors: {errors} | Error Rate: {rate:.2f}%")
          if rate > 1.0:
              print(f"FAIL: Error rate {rate:.2f}% exceeds 1% threshold")
              sys.exit(1)
          else:
              print("PASS: Error rate within limits")
          EOF

      - name: Upload Baseline Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: reports/baseline/
          retention-days: 30

  load-test:
    name: Load Test (150 Users)
    runs-on: ubuntu-latest
    needs: baseline-test
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'load' ||
      github.event.inputs.test_type == 'all'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}

      - name: Create Directories
        run: mkdir -p results reports/load

      - name: Run Load Test
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t DemoBlaze_PerformanceTest.jmx \
            -l results/demoblaze_load.jtl \
            -e \
            -o reports/load \
            -JUSERNAME=${{ secrets.DEMOBLAZE_USERNAME }} \
            -JPASSWORD=${{ secrets.DEMOBLAZE_PASSWORD }}
        continue-on-error: true

      - name: Upload Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-html-report
          path: reports/load/
          retention-days: 30

  stress-test:
    name: Stress Test (300 Users)
    runs-on: ubuntu-latest
    needs: load-test
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.test_type == 'stress' ||
      github.event.inputs.test_type == 'all'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}

      - name: Create Directories
        run: mkdir -p results reports/stress

      - name: Run Stress Test
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t DemoBlaze_PerformanceTest.jmx \
            -l results/demoblaze_stress.jtl \
            -e \
            -o reports/stress \
            -JUSERNAME=${{ secrets.DEMOBLAZE_USERNAME }} \
            -JPASSWORD=${{ secrets.DEMOBLAZE_PASSWORD }}
        continue-on-error: true

      - name: Upload Stress Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-html-report
          path: reports/stress/
          retention-days: 30

  endurance-test:
    name: Endurance Test (100 Users / 5 min)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.test_type == 'endurance' ||
      github.event.inputs.test_type == 'all'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}

      - name: Create Directories
        run: mkdir -p results reports/endurance

      - name: Run Endurance Test
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t DemoBlaze_PerformanceTest.jmx \
            -l results/demoblaze_endurance.jtl \
            -e \
            -o reports/endurance \
            -Jduration=300 \
            -JUSERNAME=${{ secrets.DEMOBLAZE_USERNAME }} \
            -JPASSWORD=${{ secrets.DEMOBLAZE_PASSWORD }}
        continue-on-error: true

      - name: Upload Endurance Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-test-html-report
          path: reports/endurance/
          retention-days: 30